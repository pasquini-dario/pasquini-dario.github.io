<!DOCTYPE html>
<html lang="en">
<!--
  ============================================================================
  NEW POST PAGE TEMPLATE  —  copy this file to <slug>.html and fill in the
  ALL-CAPS placeholders below. This static wrapper is what makes social-media
  link previews work: crawlers (X, LinkedIn, Slack, Facebook, WhatsApp, ...)
  don't run JavaScript, so every post needs its own file with its own <head>.

  Replace, then delete this comment:
    SLUG          -> the posts.json slug (also the filename: <slug>.html)
    TITLE         -> the post title (must match posts.json)
    DESCRIPTION   -> one-line summary (match posts.json "description")
    YYYY-MM-DD    -> publish date (match posts.json "date")
    AUTHOR        -> author name(s) (match posts.json; default Dario Pasquini)
    OG_IMAGE      -> absolute URL of a 1200x630 preview image. Point it at a
                     post-specific image in posts/images/, or fall back to the
                     site default: https://pasquini-dario.github.io/me/me.png
    twitter:card  -> summary_large_image (big banner) or summary (small thumb)
  Everything else is boilerplate — leave it as-is.
  ============================================================================
-->
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />

	<!-- ===== Per-post identity (static so social crawlers, which don't run JS, read it) ===== -->
	<title>TITLE — Dario Pasquini</title>
	<meta name="description" content="DESCRIPTION" />
	<link rel="canonical" href="https://pasquini-dario.github.io/me/blog/SLUG.html" />

	<meta property="og:type" content="article" />
	<meta property="og:site_name" content="Dario Pasquini — Blog" />
	<meta property="og:title" content="TITLE" />
	<meta property="og:description" content="DESCRIPTION" />
	<meta property="og:url" content="https://pasquini-dario.github.io/me/blog/SLUG.html" />
	<meta property="og:image" content="https://pasquini-dario.github.io/me/blog/posts/images/OG_IMAGE.png" />
	<meta property="article:published_time" content="YYYY-MM-DD" />
	<meta property="article:author" content="AUTHOR" />

	<meta name="twitter:card" content="summary_large_image" />
	<meta name="twitter:title" content="TITLE" />
	<meta name="twitter:description" content="DESCRIPTION" />
	<meta name="twitter:image" content="https://pasquini-dario.github.io/me/blog/posts/images/OG_IMAGE.png" />
	<!-- ===== end per-post identity ===== -->

	<link rel="icon" type="image/x-icon" href="../favicon.ico" />
	<link rel="alternate" type="application/atom+xml" title="Blog feed" href="feed.xml" />

	<!-- Rendering libraries, pinned. Order matters: katex must load before
	     marked-katex-extension (its UMD build binds the global `katex` at load). -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.css" />
	<!-- Both highlight.js themes are present; the inline script below enables one. -->
	<link id="hljs-dark" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.11.1/styles/github-dark.min.css" />
	<link id="hljs-light" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.11.1/styles/github.min.css" disabled />
	<link rel="stylesheet" href="blog.css" />

	<!-- Set theme + code stylesheet before first paint (dark by default) to avoid a flash. -->
	<script>
		(function () {
			var t; try { t = localStorage.getItem("blog-theme"); } catch (e) {}
			t = t || "dark";
			document.documentElement.dataset.theme = t;
			var d = document.getElementById("hljs-dark"), l = document.getElementById("hljs-light");
			if (d && l) { d.disabled = t !== "dark"; l.disabled = t === "dark"; }
		})();
	</script>
	<script defer src="theme.js"></script>
</head>
<body>
	<header class="blog-header">
		<nav class="blog-nav"><a href="../index.html">← Home</a> · <a href="index.html">Blog</a></nav>
		<button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle theme">☀</button>
	</header>

	<main class="blog-container">
		<!-- Title baked in (matches posts.json) so it shows before JS runs. -->
		<h1 id="post-title">TITLE</h1>
		<p id="post-date" class="post-meta"></p>
		<article id="content">
			<noscript>This blog renders Markdown in your browser, so it needs JavaScript enabled.</noscript>
		</article>
	</main>

	<!-- Renderer globals (classic scripts, run during parse), then the shared module. -->
	<script src="https://cdn.jsdelivr.net/npm/katex@0.17.0/dist/katex.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/marked@18.0.6/lib/marked.umd.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/marked-katex-extension@5.1.10/lib/index.umd.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/@highlightjs/cdn-assets@11.11.1/highlight.min.js"></script>
	<!-- Tells reader.js which post to render (must match a slug in posts.json). -->
	<script>window.BLOG_POST_SLUG = "SLUG";</script>
	<script type="module" src="reader.js"></script>
</body>
</html>
